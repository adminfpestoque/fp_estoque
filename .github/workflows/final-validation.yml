name: Final validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    if: github.head_ref == 'agent/final-validation'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        shell: bash
        working-directory: backend
        run: |
          set -euo pipefail
          pip install -r requirements.txt 2>&1 | tee ../backend-install.log

      - name: Run backend tests
        shell: bash
        working-directory: backend
        env:
          USE_SQLITE_FOR_TESTS: 'true'
        run: |
          set -euo pipefail
          python manage.py test inventory -v 2 2>&1 | tee ../backend-tests.log

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci 2>&1 | tee ../frontend-install.log

      - name: Build frontend
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee ../frontend-build.log

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-validation-strict
          path: |
            backend-install.log
            backend-tests.log
            frontend-install.log
            frontend-build.log
          if-no-files-found: ignore
          retention-days: 2
